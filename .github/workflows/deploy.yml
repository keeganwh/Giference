name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Content the app writes at runtime (gifs, thumbnails, the metadata index)
    # is fetched live and isn't bundled into the site, so those commits don't
    # need a rebuild. Only redeploy when the app code/config actually changes.
    paths-ignore:
      - 'data/**'
      - 'gifs/**'
      - 'thumbs/**'
      - 'PROJECT_LOG.md'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
